spring.application.name=IA Bot

# Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/databasebot?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
# --- GOOGLE GEMINI ---
spring.ai.google.ai.gemini.api-key=${GOOGLE_KEY_API}
spring.ai.google.ai.gemini.chat.options.model=gemini-1.5-flash
#---GROQ---
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

